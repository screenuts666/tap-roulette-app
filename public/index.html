<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Tap Roulette</title>

    <link rel="manifest" href="manifest.json" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Tap Roulette" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="start-screen">
      <div class="logo-container">
        <svg
          viewBox="0 0 24 24"
          width="60"
          height="60"
          stroke="currentColor"
          stroke-width="1"
          fill="none"
          class="start-icon"
        >
          <polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"></polygon>
          <circle cx="12" cy="12" r="3"></circle>
        </svg>
        <h1 class="title">INITIATIVE</h1>
        <p class="subtitle">Scegli il primo giocatore</p>
      </div>
      <button id="start-btn">PREPARA IL TAVOLO</button>
    </div>
    <div id="ui-layer">
      <h1 id="message">Piazzate le dita</h1>
      <button id="restart-btn" style="display: none">
        <svg
          viewBox="0 0 24 24"
          width="36"
          height="36"
          stroke="currentColor"
          stroke-width="2.5"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
      </button>
    </div>

    <script src="script.js"></script>
  </body>
</html>
